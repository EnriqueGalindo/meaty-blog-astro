<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" role="img" aria-label="Well done — thanks for reading">
  <!-- End-of-article sign-off stamp. Delivered upright; tilt ~ -8deg when placing
       for the "stamped" look. NOTE: curved text is live (font Oswald). -->
  <title>Well done — thanks for reading</title>
  <defs>
    <path id="arc-top-w" d="M26,70 A44,44 0 0 1 114,70" fill="none"/>
    <path id="arc-bot-w" d="M30,70 A40,40 0 0 0 110,70" fill="none"/>
  </defs>
  <circle cx="70" cy="70" r="56" fill="none" stroke="#9e2b25" stroke-width="3"/>
  <circle cx="70" cy="70" r="42" fill="none" stroke="#9e2b25" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text font-family="Oswald, 'Arial Narrow', sans-serif" font-weight="700" font-size="13" letter-spacing="2" fill="#9e2b25">
    <textPath href="#arc-top-w" startOffset="50%" text-anchor="middle">WELL DONE</textPath>
  </text>
  <text font-family="Oswald, 'Arial Narrow', sans-serif" font-weight="600" font-size="8.5" letter-spacing="2" fill="#9e2b25">
    <textPath href="#arc-bot-w" startOffset="50%" text-anchor="middle">THANKS FOR READING</textPath>
  </text>
  <g transform="translate(70,72) scale(0.5) translate(-60,-60)">
    <rect x="24" y="36" width="72" height="48" fill="#9e2b25"/>
    <ellipse cx="60" cy="36" rx="36" ry="13" fill="#9e2b25"/>
    <ellipse cx="60" cy="84" rx="36" ry="13" fill="#9e2b25"/>
    <ellipse cx="60" cy="36" rx="36" ry="13" fill="none" stroke="#f4ece0" stroke-width="3.5"/>
    <path d="M26,61 q17,-7 34,0 t34,0" fill="none" stroke="#f4ece0" stroke-width="4"/>
    <path d="M26,69 q17,-7 34,0 t34,0" fill="none" stroke="#f4ece0" stroke-width="4"/>
  </g>
</svg>
