<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Meaty Blog — getting into the meat of it">
  <!-- Default Open Graph card MASTER (1200x630). Vector source.
       Social platforms need a raster (PNG) — export this with a rasterizer
       (rsvg-convert / sharp / a build-time OG generator). Curved + body text
       is live (fonts Oswald + Bitter) — render with those fonts available. -->
  <title>Meaty Blog</title>
  <defs>
    <pattern id="og-awning" width="56" height="20" patternUnits="userSpaceOnUse">
      <rect width="28" height="20" fill="#9e2b25"/>
      <rect x="28" width="28" height="20" fill="#f4ece0"/>
    </pattern>
    <path id="og-arc-top" d="M22,70 A48,48 0 0 1 118,70" fill="none"/>
    <path id="og-arc-bot" d="M26,70 A44,44 0 0 0 114,70" fill="none"/>
  </defs>

  <!-- ground + paper grain -->
  <rect width="1200" height="630" fill="#f4ece0"/>
  <rect width="1200" height="20" fill="url(#og-awning)"/>
  <rect y="20" width="1200" height="3" fill="#2b211c"/>

  <!-- stamp lockup, centered -->
  <g transform="translate(495,70) scale(1.5)">
    <circle cx="70" cy="70" r="60" fill="none" stroke="#9e2b25" stroke-width="3"/>
    <circle cx="70" cy="70" r="46" fill="none" stroke="#9e2b25" stroke-width="1.4" stroke-dasharray="3 3"/>
    <text font-family="Oswald, 'Arial Narrow', sans-serif" font-weight="700" font-size="13" letter-spacing="2.5" fill="#9e2b25">
      <textPath href="#og-arc-top" startOffset="50%" text-anchor="middle">MEATY BLOG</textPath>
    </text>
    <text font-family="Oswald, 'Arial Narrow', sans-serif" font-weight="600" font-size="9" letter-spacing="2.5" fill="#9e2b25">
      <textPath href="#og-arc-bot" startOffset="50%" text-anchor="middle">PRIME CUTS</textPath>
    </text>
    <g transform="translate(70,72) scale(0.62) translate(-60,-60)">
      <rect x="24" y="36" width="72" height="48" fill="#9e2b25"/>
      <ellipse cx="60" cy="36" rx="36" ry="13" fill="#9e2b25"/>
      <ellipse cx="60" cy="84" rx="36" ry="13" fill="#9e2b25"/>
      <ellipse cx="60" cy="36" rx="36" ry="13" fill="none" stroke="#ece1d0" stroke-width="3"/>
      <path d="M26,61 q17,-7 34,0 t34,0" fill="none" stroke="#ece1d0" stroke-width="3.4"/>
      <path d="M26,69 q17,-7 34,0 t34,0" fill="none" stroke="#ece1d0" stroke-width="3.4"/>
    </g>
  </g>

  <!-- wordmark + taglines -->
  <text x="600" y="420" text-anchor="middle" font-family="Oswald, 'Arial Narrow', sans-serif" font-weight="700" font-size="96" letter-spacing="3" fill="#2b211c">MEATY BLOG</text>
  <text x="600" y="478" text-anchor="middle" font-family="Bitter, Georgia, serif" font-style="italic" font-size="40" fill="#5c4e44">Getting into the meat of it.</text>
  <text x="600" y="528" text-anchor="middle" font-family="Oswald, 'Arial Narrow', sans-serif" font-weight="600" font-size="24" letter-spacing="6" fill="#9e2b25">PRIME CUTS OF DATA ENGINEERING</text>
</svg>
